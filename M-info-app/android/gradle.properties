org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=1G -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Kotlin incremental compilation computes relative paths between the project
# (E:\) and the Flutter pub cache plugin sources (C:\). On Windows those live
# on different drive roots, which crashes the incremental cache writer with
# "this and base files have different roots". Disabling incremental Kotlin
# compilation sidesteps that cross-drive path math. Build is fully correct,
# just not incremental for the (small) plugin Kotlin sources.
kotlin.incremental=false
