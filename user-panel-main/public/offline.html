<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - 1birr.bet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 500px;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        h1 {
            font-size: 32px;
            margin-bottom: 16px;
            color: #a8e063;
        }

        p {
            font-size: 18px;
            color: #ccc;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .button {
            display: inline-block;
            padding: 12px 30px;
            background: #a8e063;
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .button:hover {
            background: #96d04f;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(168, 224, 99, 0.3);
        }

        .features {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
        }

        .features h3 {
            color: #ffc107;
            margin-bottom: 16px;
        }

        .features ul {
            list-style: none;
            padding: 0;
        }

        .features li {
            padding: 8px 0;
            color: #aaa;
            font-size: 14px;
        }

        .features li:before {
            content: "✓ ";
            color: #a8e063;
            font-weight: bold;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>
            No internet connection detected. Don't worry, you can still view your
            cached bets and prepare your next betting slip.
        </p>

        <a href="/" class="button" onclick="window.location.reload(); return false;">
            Try Again
        </a>

        <div class="features">
            <h3>What You Can Do Offline:</h3>
            <ul>
                <li>View previously loaded matches</li>
                <li>Check your betting history</li>
                <li>Prepare your betslip</li>
                <li>Explore cached content</li>
            </ul>
        </div>
    </div>

    <script>
        // Auto-retry connection
        window.addEventListener('online', () => {
            window.location.reload();
        });

        // Show online status
        if (navigator.onLine) {
            document.querySelector('.button').click();
        }
    </script>
</body>
</html>
