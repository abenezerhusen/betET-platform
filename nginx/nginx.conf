events { worker_connections 1024; }

http {
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  limit_req_zone $binary_remote_addr zone=bets:10m rate=30r/m;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  upstream backend { server backend:4000; }
  upstream admin { server admin-panel:5173; }
  upstream users { server user-panel:3000; }
  upstream cashier { server cashier-panel:3001; }
  upstream games { server game-engine:3002; }

  server {
    listen 80;
    server_name admin.playcore.local;

    location / {
      proxy_pass http://admin;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }

  server {
    listen 80;
    server_name app.playcore.local;

    location / {
      proxy_pass http://users;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 80;
    server_name cashier.playcore.local;

    location / {
      proxy_pass http://cashier;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 80;
    server_name games.playcore.local;

    location / {
      proxy_pass http://games;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
    }
  }

  server {
    listen 80;
    server_name api.playcore.local;

    location /api/auth/login {
      limit_req zone=login burst=3 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/bets/ {
      limit_req zone=bets burst=5 nodelay;
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }
}
